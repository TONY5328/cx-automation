name: Smart Slack Alert

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Simulate Test
        run: |
          echo "Running test..."
          exit 1   # change to 0 for pass

      - name: Send Success Alert
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\":\"✅ Build Passed\n📦 Repo: ${{ github.repository }}\n🌿 Branch: ${{ github.ref_name }}\n👤 Triggered by: ${{ github.actor }}\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send Failure Alert with Details
        if: failure()
        run: |
          echo "Collecting error logs..."

          ERROR_MSG="Build failed in step: Simulate Test"

          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\":\"❌ Build Failed\n📦 Repo: ${{ github.repository }}\n🌿 Branch: ${{ github.ref_name }}\n👤 Triggered by: ${{ github.actor }}\n⚠️ Error: $ERROR_MSG\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
